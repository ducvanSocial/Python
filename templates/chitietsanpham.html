{% extends 'layout/thuake.html' %}

{% block title %}Chi tiết sản phẩm{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <div class="row">
            <div class="col-md-5 text-center">
                <img src="{{ url_for('static', filename=products.anh) }}" alt="{{ products.name }}"class="img-fluid rounded">
            </div>
            <div class="">
                <h2> {{products.name }}</h2>
                <h3>{{products.price}}</h3>
                <hr>
                <h5>Mô tả sản phẩm</h5>
                <p class="text-muted">{{ products.ghichu }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
