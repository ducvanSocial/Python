{% extends 'layout/thuake.html' %}

{% block title %} Đăng Kí Người Dùng{% endblock %}

{% block content %}
<h2 class="subject text-center my-4"> Đăng Kí Tài Khoản</h2>

<div style="width: 350px; margin: 50px auto;">
    <form method="post" action="/dangki">
        <div class="form-group">
            <label for="name">Họ Tên</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <input type="submit" value="Đăng ký" class="btn btn-outline-success">
    </form>
</div>

{% endblock %}
