{% extends 'layout/thuake.html' %}
{% block title %} Trang Chủ{% endblock %}
{% block content %}

<div style="width: 350px; margin: 50px auto;">
    <h1 class="subject text-center my-4"> Thêm Sản Phẩm</h1>
    <form method="POST" action='/them'>
        <div class="form-group mb-3">
            <label>Tên Sản Phẩm</label>
            <input type="text" class="form-control" name="name" required>
        </div>

        <div class="form-group mb-3">
            <label>Nhập Mô Tả</label>
            <input type="text" class="form-control" name="description" required>
        </div>
        <div class="form-group mb-3">
            <label>Giá tiền</label>
            <input type="number" class="form-control" name="price" required>
        </div>
        <div class="form-group mb-3">
            <label>Ảnh</label>
            <input type="file" class="form-control" name="image" accept="image/*" required>
        </div>
        <div class="form-group mb-3">
            <label>Mã Sản Phẩm</label>
            <input type="number" class="form-control" name="category_id" required>
        </div>

        <input type="submit" value="Thêm" class="btn btn-outline-success"> </form>
    <a href="/" class="btn btn-secondary mt-2">Quay lại trang chủ</a>
</div>
{% endblock %}
