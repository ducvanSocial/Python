{% extends 'layout/thuake.html' %}
{% block title %}Thanh Toán{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <div class="row">

            <div class="col-md-5 text-center">
                <img src="{{ url_for('static', filename=sanpham.anh) }}" alt="{{ sanpham.name }}" class="img-fluid rounded">
            </div>
            <div class="col-md-7">
                <h2>{{ sanpham.name }}</h2>
                <h3> {{ sanpham.price }}</h3>
                <hr>

                <h5>Mô tả sản phẩm</h5>
                <p class="text-muted">{{sanpham.description }}</p>
                <button type="button" class="btn btn-success mt-3"> Thanh Toán
                </button>
            </div>

        </div>
    </div>
</div>
{% endblock %}
